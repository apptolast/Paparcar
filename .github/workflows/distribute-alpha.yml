name: Alpha (Internal Distribution)

on:
  push:
    branches:
      - alpha
  workflow_dispatch:

concurrency:
  group: distribute-alpha-${{ github.ref }}
  cancel-in-progress: true

jobs:
  distribute:
    name: Build Debug & Distribute
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle.kts', '**/libs.versions.toml', '**/gradle-wrapper.properties') }}

      - name: Inject Config
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
          GOOGLE_WEB_CLIENT_ID: ${{ secrets.GOOGLE_WEB_CLIENT_ID }}
        run: |
          echo "$GOOGLE_SERVICES_JSON" > composeApp/google-services.json
          echo "GOOGLE_WEB_CLIENT_ID=$GOOGLE_WEB_CLIENT_ID" > local.properties
          echo "MAPS_API_KEY=${{ secrets.MAPS_API_KEY }}" >> local.properties

      # [AUDIT-INFRA-001 C2] Flavor-aware task + output path (apk/prod/debug/...): the pre-flavor
      # path made the upload step fail on a missing file.
      - name: Build Debug APK
        run: ./gradlew :composeApp:assembleProdDebug --no-daemon

      - name: Generate release notes
        run: git log --oneline -5 > release_notes.txt

      - name: Upload to Firebase App Distribution
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: ${{ secrets.FIREBASE_APP_ID }}
          token: ${{ secrets.FIREBASE_TOKEN }}
          groups: "alpha-paparcar" # Grupo para desarrollo/alpha
          file: composeApp/build/outputs/apk/prod/debug/composeApp-prod-debug.apk
          releaseNotesFile: release_notes.txt
