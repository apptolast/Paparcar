name: CI (Validation)

on:
  push:
    branches:
      - master
      - alpha
      - beta
  pull_request:
    branches:
      - master
      - alpha
      - beta

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Lint & Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle.kts', '**/libs.versions.toml', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Inject Config (Mock/CI)
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
          GOOGLE_WEB_CLIENT_ID: ${{ secrets.GOOGLE_WEB_CLIENT_ID }}
        run: |
          echo "$GOOGLE_SERVICES_JSON" > composeApp/google-services.json
          echo "GOOGLE_WEB_CLIENT_ID=$GOOGLE_WEB_CLIENT_ID" > local.properties
          echo "MAPS_API_KEY=mock_key" >> local.properties

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # [AUDIT-INFRA-001 C1] With product flavors (prod/mock) the un-flavored task names were
      # ambiguous and the suite (incl. Konsist guardrails) never actually ran in CI. Build BOTH
      # flavors' compilation (mock catches DI/fake drift that prod hides) and run the prod suite.
      - name: Build Check
        run: ./gradlew :composeApp:assembleProdDebug :composeApp:compileMockDebugKotlinAndroid --no-daemon --stacktrace

      - name: Run unit tests
        run: ./gradlew :composeApp:testProdDebugUnitTest --no-daemon --stacktrace

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: composeApp/build/reports/tests/
          retention-days: 7
