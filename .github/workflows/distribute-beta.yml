name: Beta (External Distribution)

on:
  push:
    branches:
      - beta # Solo cuando se mergea master -> beta

jobs:
  distribute-release:
    name: Build Release & Distribute
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle.kts', '**/libs.versions.toml', '**/gradle-wrapper.properties') }}

      - name: Inject Config & Decode Keystore
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
          RELEASE_KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
        run: |
          echo "$GOOGLE_SERVICES_JSON" > composeApp/google-services.json
          echo "$RELEASE_KEYSTORE_BASE64" | base64 --decode > release.keystore

      - name: Build & Sign Release APK
        run: ./gradlew :composeApp:assembleRelease --no-daemon
        env:
          RELEASE_KEYSTORE_FILE: ../release.keystore
          RELEASE_KEYSTORE_PASSWORD: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
          MAPS_API_KEY: ${{ secrets.MAPS_API_KEY }}
          GOOGLE_WEB_CLIENT_ID: ${{ secrets.GOOGLE_WEB_CLIENT_ID }}

      - name: Generate Changelog
        run: |
          # Obtiene los cambios entre beta y el commit actual
          git log --oneline -10 > changelog.txt

      - name: Upload to Firebase App Distribution
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: ${{ secrets.FIREBASE_APP_ID }}
          token: ${{ secrets.FIREBASE_TOKEN }}
          groups: "beta-paparcar" # Grupo para testers externos (beta)
          file: composeApp/build/outputs/apk/release/composeApp-release.apk
          releaseNotesFile: changelog.txt
