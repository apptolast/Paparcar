<?xml version="1.0" encoding="UTF-8"?>
<!--
  Paparcar full brand logo · SVG for docs/README.
  Faithful conversion of composeResources/drawable/paparcar_logo.xml (the source
  of truth used by the app). Dark Ink disc (#0D1117) + neon-green car glyph
  (#25F48C). Theme-independent: the disc is always dark, so it reads the same
  on light and dark GitHub themes. Brand fill is baked in — Nivel 3: do NOT tint.
-->
